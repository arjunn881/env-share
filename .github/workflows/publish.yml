name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Print versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Configure git credentials for provenance
        run: git config --global url."https://oauth2:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Publish CLI workspace to npm
        run: npm publish --workspace=cli --provenance --access public
